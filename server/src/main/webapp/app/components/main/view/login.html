<div class="hobi-login-bg">
    <div>

    </div>
    <div class="hobi-login-right">
        <div class="hobi-login-box" ng-class='{"panel-danger": errorMessage, "panel-success": successMessage}'>
            <div class="hobi-login-header-msg panel-heading" ng-if='errorMessage'>{{errorMessage}}</div>
            <div class="hobi-login-header-msg panel-heading" ng-if='successMessage'>{{successMessage}}</div>

            <div class="hobi-login-logo">
                <img src="images/logo_hobi_azul.png" alt="Hobi MDM" />
            </div>

            <form name='loginForm' ng-submit='onLogin()'>
                <div class='form-group'>
                    <label for='username' localized>login.username</label>
                    <input type='text' class='form-control' id='username' ng-model='login.username'
                        localized-placeholder="login.username.placeholder" required />
                </div>
                <div class='form-group'>
                    <label for='password' localized>login.password</label>
                    <input type='password' class='form-control' id='password' ng-model='login.password'
                        localized-placeholder='login.password.placeholder' required />
                </div>

                <div style="min-height: 36px; display: flex; flex-direction: column; margin-bottom: 8px;">
                    <div ng-if="canRecover"><a class="action-link" ng-click="recoverPassword()"
                            localized>login.password.recovery</a></div>
                    <div ng-if="rebranding.signupLink"><span localized>login.no.account</span> <a class="action-link"
                            href="{{rebranding.signupLink}}" localized>login.signup</a></div>
                    <div ng-if="!rebranding.signupLink && canSignup"><span localized>login.no.account</span> <a
                            class="action-link" ng-click="signup()" localized>login.signup</a></div>
                </div>

                <button type='submit' class='btn hobi-login-btn' style="width:100%" ng-disabled='loginForm.$invalid'
                    localized>login.submit</button>
            </form>
        </div>
    </div>
</div>

<div class='content-wrapper width-1000' ng-if="isIE">
    <div localized>ie.browser.notice.1</div>
    <div ng-bind-html="ieBrowserNotice2"></div>
</div>
